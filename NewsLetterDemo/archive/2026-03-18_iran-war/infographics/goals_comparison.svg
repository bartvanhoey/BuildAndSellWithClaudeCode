<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 260" width="560" height="260">
  <rect width="560" height="260" rx="8" fill="#f9fafb"/>
  <rect x="280" y="50" width="1" height="180" fill="#e5e7eb"/>
  <text x="280" y="36" font-family="sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">War Objectives: Two Irreconcilable Goals</text>
  <text x="140" y="80" font-family="sans-serif" font-size="13" font-weight="700" fill="#093824" text-anchor="middle" letter-spacing="1">US &amp; Israel</text>
  <text x="140" y="140" font-family="sans-serif" font-size="52" font-weight="800" fill="#093824" text-anchor="middle">Destroy</text>
  <text x="140" y="172" font-family="sans-serif" font-size="14" fill="#374151" text-anchor="middle">Eliminate nuclear</text>
  <text x="140" y="194" font-family="sans-serif" font-size="14" fill="#374151" text-anchor="middle">capability, decapitate</text>
  <text x="140" y="216" font-family="sans-serif" font-size="14" fill="#374151" text-anchor="middle">military leadership,</text>
  <text x="140" y="238" font-family="sans-serif" font-size="14" fill="#374151" text-anchor="middle">force regime change or</text>
  <text x="140" y="260" font-family="sans-serif" font-size="14" fill="#374151" text-anchor="middle">capitulation</text>
  <text x="420" y="80" font-family="sans-serif" font-size="13" font-weight="700" fill="#c0652a" text-anchor="middle" letter-spacing="1">Iran</text>
  <text x="420" y="140" font-family="sans-serif" font-size="52" font-weight="800" fill="#c0652a" text-anchor="middle">Survive</text>
  <text x="420" y="172" font-family="sans-serif" font-size="14" fill="#374151" text-anchor="middle">Preserve the regime,</text>
  <text x="420" y="194" font-family="sans-serif" font-size="14" fill="#374151" text-anchor="middle">exhaust the coalition,</text>
  <text x="420" y="216" font-family="sans-serif" font-size="14" fill="#374151" text-anchor="middle">negotiate from a</text>
  <text x="420" y="238" font-family="sans-serif" font-size="14" fill="#374151" text-anchor="middle">position of endurance</text>
  <text x="420" y="260" font-family="sans-serif" font-size="14" fill="#374151" text-anchor="middle">not defeat</text>
</svg>
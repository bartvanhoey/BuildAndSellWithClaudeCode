<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 352" width="560" height="352">
  <rect width="560" height="352" rx="8" fill="#f9fafb"/>
  <text x="280" y="28" font-family="sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Iran's Asymmetric Strategy</text>
  <line x1="40" y1="78" x2="40" y2="116" stroke="#093824" stroke-width="2" opacity="0.3"/>
  <circle cx="40" cy="62" r="18" fill="#093824"/>
  <text x="40" y="67" font-family="sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle">1</text>
  <text x="72" y="58" font-family="sans-serif" font-size="15" font-weight="700" fill="#111827">Proxy Network</text>
  <text x="72" y="76" font-family="sans-serif" font-size="13" fill="#6b7280">Hezbollah, Houthis, Iraqi militias absorb pressure</text>
  <text x="72" y="94" font-family="sans-serif" font-size="13" fill="#6b7280">and stretch US-Israeli resources across multiple</text>
  <line x1="40" y1="150" x2="40" y2="188" stroke="#093824" stroke-width="2" opacity="0.3"/>
  <circle cx="40" cy="134" r="18" fill="#093824"/>
  <text x="40" y="139" font-family="sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle">2</text>
  <text x="72" y="130" font-family="sans-serif" font-size="15" font-weight="700" fill="#111827">Missile Deterrence</text>
  <text x="72" y="148" font-family="sans-serif" font-size="13" fill="#6b7280">Ballistic missile arsenal threatens Israel and Gulf</text>
  <text x="72" y="166" font-family="sans-serif" font-size="13" fill="#6b7280">neighbours, raising the cost of direct confrontation</text>
  <line x1="40" y1="222" x2="40" y2="260" stroke="#093824" stroke-width="2" opacity="0.3"/>
  <circle cx="40" cy="206" r="18" fill="#093824"/>
  <text x="40" y="211" font-family="sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle">3</text>
  <text x="72" y="202" font-family="sans-serif" font-size="15" font-weight="700" fill="#111827">Hormuz Leverage</text>
  <text x="72" y="220" font-family="sans-serif" font-size="13" fill="#6b7280">Threat to close the Strait of Hormuz — 20% of global</text>
  <text x="72" y="238" font-family="sans-serif" font-size="13" fill="#6b7280">oil supply — as economic pressure on the West</text>
  <circle cx="40" cy="278" r="18" fill="#093824"/>
  <text x="40" y="283" font-family="sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle">4</text>
  <text x="72" y="274" font-family="sans-serif" font-size="15" font-weight="700" fill="#111827">Outlast, Don't Defeat</text>
  <text x="72" y="292" font-family="sans-serif" font-size="13" fill="#6b7280">Survive the assault, preserve the regime, wait for</text>
  <text x="72" y="310" font-family="sans-serif" font-size="13" fill="#6b7280">US domestic pressure and coalition fatigue to force</text>
</svg>